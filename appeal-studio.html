<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appeal Studio — Direct Mail Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
/* ── Reset & Base ── */
:root {
  --bg: #0c0c0e; --nm: #111114; --nl: #14141a;
  --gold: #c9a84c; --gold-lt: #e0bc6e;
  --cream: #f0ece4; --text: #e8e4dc; --muted: #8a8a8a; --dim: #777;
  --border: rgba(201,168,76,.22); --border-dim: #252528;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Source Sans 3', Georgia, serif; font-size: 16px; line-height: 1.55; }
input, textarea, button, select { font-family: inherit; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
p { margin-bottom: .5rem; }
li { margin-left: 1.25rem; margin-bottom: .25rem; }
strong { color: var(--cream); }

/* ── Header ── */
.header { background: linear-gradient(135deg,#090909,var(--nm)); border-bottom: 1px solid var(--border); padding: 1.5rem 2.5rem; display: flex; align-items: center; gap: 1.25rem; }
.logo-badge { width: 44px; height: 44px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display',serif; font-weight: 900; font-size: 1.05rem; color: #0a0a0a; flex-shrink: 0; letter-spacing: -.02em; }
.header-title { font-family: 'Playfair Display',serif; font-size: 1.3rem; font-weight: 700; color: var(--cream); letter-spacing: -.01em; }
.header-sub { font-size: .72rem; color: rgba(201,168,76,.65); margin-top: .15rem; letter-spacing: .12em; text-transform: uppercase; }

/* ── Main ── */
.main { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

/* ── Hero ── */
.hero { margin-bottom: 2.25rem; }
.hero h1 { font-family: 'Playfair Display',serif; font-size: 2.2rem; font-weight: 700; line-height: 1.2; color: var(--cream); margin-bottom: .75rem; letter-spacing: -.01em; }
.hero-accent { color: var(--gold); }
.hero-sub { color: var(--muted); font-size: .86rem; line-height: 1.65; max-width: 500px; }

/* ── Required inputs card ── */
.inputs-card { background: var(--nl); border: 1px solid var(--border-dim); border-radius: 12px 12px 0 0; padding: 1.5rem 1.5rem 1.3rem; border-bottom: none; }
.inputs-card .field + .field { margin-top: 1.1rem; }
.field { display: flex; flex-direction: column; gap: .42rem; }
.label { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(210,205,195,.9); font-family: monospace; }
.input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; padding: .72rem 1rem; color: var(--text); font-size: .9rem; line-height: 1.5; transition: border-color .15s, background .15s; }
.input:focus { outline: none; border-color: rgba(201,168,76,.5); background: rgba(255,255,255,.06); }
.input::placeholder { color: rgba(200,192,180,.25); }
textarea.input { resize: vertical; }
.field-hint { font-size: .66rem; color: rgba(200,192,180,.6); font-family: monospace; margin-top: .1rem; }
.inputs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
.inputs-row .field + .field { margin-top: 0; }

/* ── Customize Bar ── */
.cbar { background: var(--nm); border: 1px solid var(--border-dim); border-top: none; border-radius: 0 0 12px 12px; padding: 1.2rem 1.5rem 1.4rem; margin-bottom: 2rem; }
.cbar-note { font-size: .76rem; line-height: 1.45; color: rgba(220,212,200,.82); margin: 0 0 .85rem; }
.cbar-row { display: flex; gap: .9rem; align-items: flex-end; flex-wrap: wrap; }
.cbar-row + .cbar-row { margin-top: .95rem; padding-top: .95rem; border-top: 1px solid rgba(255,255,255,.05); }

/* Fields inside cbar */
.cf { display: flex; flex-direction: column; gap: .4rem; min-width: 0; }
.cf-wide { flex: 2.5; min-width: 200px; }
.cf-med { flex: 1.5; min-width: 150px; }
.cf-sm { flex: 0 0 auto; }
.cl { font-size: .64rem; font-weight: 700; letter-spacing: .11em; text-transform: uppercase; color: rgba(220,212,200,.92); white-space: nowrap; }
.cl em { font-style: normal; font-weight: 400; color: rgba(180,172,160,.5); font-size: .94em; }
.ci { padding: .64rem .88rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; color: var(--text); font-size: .88rem; width: 100%; transition: border-color .2s, background .2s; }
.ci:focus { outline: none; border-color: rgba(201,168,76,.55); background: rgba(255,255,255,.06); }
.ci::placeholder { color: rgba(200,192,180,.28); }
.sw { position: relative; }
.sw::after { content: '▾'; position: absolute; right: .72rem; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: .66rem; pointer-events: none; }
select.ci { appearance: none; cursor: pointer; padding-right: 2.1rem; }

/* Advanced section */
.cbar-adv { margin-top: 1rem; border: 1px solid rgba(255,255,255,.07); border-radius: 10px; background: rgba(255,255,255,.016); overflow: hidden; }
.cbar-adv > summary { cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .82rem 1.1rem; color: rgba(220,212,200,.7); font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; background: rgba(255,255,255,.02); transition: background .2s, color .2s; user-select: none; }
.cbar-adv > summary::-webkit-details-marker { display: none; }
.cbar-adv > summary:hover { background: rgba(255,255,255,.04); color: var(--cream); }
.cbar-adv > summary::after { content: '+'; color: var(--gold); font-size: .95rem; font-weight: 700; }
.cbar-adv[open] > summary::after { content: '−'; }
.cbar-adv-body { padding: 1.1rem 1.1rem 1.2rem; display: flex; flex-direction: column; gap: .9rem; }

.adv-sec-lbl { font-size: .58rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: rgba(201,168,76,.78); margin-bottom: .5rem; }
.adv-sec-lbl em { font-style: normal; font-weight: 400; letter-spacing: .04em; color: rgba(180,172,160,.28); text-transform: none; font-size: .94em; }
.adv-divider { height: 1px; background: rgba(255,255,255,.055); }
.adv-pkg-grid { display: grid; grid-template-columns: minmax(130px,160px) minmax(100px,125px) 68px 1fr; gap: .8rem .7rem; align-items: end; }
.adv-voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; align-items: end; }
.adv-bottom-row { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
.adv-divider-v { width: 1px; background: rgba(255,255,255,.06); align-self: stretch; flex-shrink: 0; }

/* Color swatches */
.adv-color-row { display: flex; gap: .4rem; align-items: flex-end; }
.cs { display: flex; flex-direction: column; gap: .24rem; align-items: center; }
.adv-cswatch-lbl { font-size: .58rem; color: rgba(200,192,180,.38); letter-spacing: .06em; text-transform: uppercase; }
.cs-pick { width: 36px; height: 32px; border: 1px solid rgba(255,255,255,.13); border-radius: 6px; cursor: pointer; padding: 0; background: none; overflow: hidden; flex-shrink: 0; transition: border-color .2s; }
.cs-pick:hover { border-color: var(--gold); }
.cs-pick input[type=color] { width: 150%; height: 150%; margin: -25% -25%; cursor: pointer; border: none; padding: 0; }
.cs-hex { width: 64px; padding: .26rem .3rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 5px; color: rgba(220,212,200,.65); font-size: .64rem; text-align: center; font-family: monospace; transition: border-color .2s, color .2s; }
.cs-hex:focus { outline: none; border-color: rgba(201,168,76,.5); color: var(--text); }
.cs-reset { background: none; border: 1px solid rgba(255,255,255,.1); border-radius: 6px; color: rgba(200,192,180,.45); cursor: pointer; font-size: .9rem; width: 28px; height: 32px; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; align-self: flex-start; }
.cs-reset:hover { border-color: var(--gold); color: var(--gold); }

/* Ask ladder */
.ladder { display: flex; gap: .38rem; }
.ladder input { width: 64px; padding: .62rem .4rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; color: var(--text); font-size: .88rem; text-align: center; transition: border-color .2s; }
.ladder input:focus { outline: none; border-color: rgba(201,168,76,.55); }
.ladder input::placeholder { color: rgba(200,192,180,.28); font-size: .74rem; }

/* Action row */
.cbar-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
.cbar-spacer { flex: 1 1 auto; }
.tog { padding: .65rem 1rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 7px; color: rgba(216,210,198,.6); font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap; }
.tog:hover { background: rgba(255,255,255,.08); color: var(--cream); border-color: rgba(255,255,255,.2); }
.tog.on { background: rgba(201,168,76,.13); color: var(--gold); border-color: rgba(201,168,76,.38); }
.tog.on-red { background: rgba(239,68,68,.1); color: #f87171; border-color: rgba(239,68,68,.32); }
.genbtn { padding: .72rem 1.65rem; background: var(--gold); color: #0a0a0a; border: none; border-radius: 7px; font-size: .9rem; font-weight: 700; cursor: pointer; letter-spacing: .04em; text-transform: uppercase; transition: all .2s; white-space: nowrap; flex-shrink: 0; }
.genbtn:hover:not(:disabled) { background: var(--gold-lt); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,.25); }
.genbtn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.genbtn.generating { animation: pulse 1.4s ease-in-out infinite; cursor: not-allowed; }

/* ── Error ── */
.error { background: #140808; border: 1px solid #4a1515; border-radius: 8px; padding: .75rem 1rem; color: #d96060; font-size: .82rem; font-family: monospace; margin-bottom: 1rem; }

/* ── Loading ── */
.loading { text-align: center; padding: 3rem 0; }
.spinner { width: 36px; height: 36px; border: 2px solid rgba(201,168,76,.12); border-top: 2px solid var(--gold); border-radius: 50%; animation: spin .85s linear infinite; margin: 0 auto .75rem; }
.loading-label { font-size: .82rem; font-weight: 600; color: var(--gold); margin-bottom: .35rem; }
.loading-status { font-size: .75rem; color: var(--dim); min-height: 1.2em; transition: opacity .3s; }
.loading-bar-wrap { width: 240px; height: 3px; background: rgba(201,168,76,.1); border-radius: 2px; margin: .9rem auto 0; overflow: hidden; }
.loading-bar { height: 100%; background: var(--gold); border-radius: 2px; transition: width .6s ease; }

/* ── Output ── */
.output-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-dim); }
.output-meta-label { font-size: .65rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: .3rem; font-family: monospace; }
.output-title { font-family: 'Playfair Display',serif; font-size: 1.15rem; color: var(--cream); }

/* ── Summary card ── */
.summary-card { background: var(--nl); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.3rem; margin-bottom: .9rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .9rem 1.2rem; }
.summary-item { display: flex; flex-direction: column; gap: .28rem; }
.summary-key { font-size: .62rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
.summary-val { font-size: .88rem; color: var(--cream); line-height: 1.4; }
.summary-val.sm { font-size: .8rem; color: #aaa8b4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.summary-badges { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .1rem; }
.sbadge { padding: .14rem .5rem; border-radius: 999px; font-size: .6rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; border: 1px solid rgba(201,168,76,.3); background: rgba(201,168,76,.1); color: var(--gold); }
.sbadge.red { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.1); color: #f87171; }

/* ── Result tabs ── */
.result-tabs { display: flex; gap: .5rem; margin-bottom: 1rem; }
.result-tab { padding: .62rem 1rem; background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.07); border-radius: 8px; color: var(--muted); font-size: .76rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.result-tab:hover { color: var(--text); border-color: rgba(201,168,76,.3); }
.result-tab.active { background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.4); color: var(--gold); }

/* ── Accordion groups ── */
details.acc-group { background: var(--nl); border: 1px solid var(--border-dim); border-radius: 12px; margin-bottom: .65rem; overflow: hidden; }
details.acc-group > summary { cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; padding: 1.05rem 1.25rem; font-family: 'Playfair Display',serif; font-size: 1rem; font-weight: 700; color: var(--cream); background: rgba(255,255,255,.015); transition: background .2s; user-select: none; }
details.acc-group > summary::-webkit-details-marker { display: none; }
details.acc-group > summary:hover { background: rgba(255,255,255,.03); }
details.acc-group > summary::after { content: '+'; color: var(--gold); font-size: 1.1rem; font-family: 'Source Sans 3',sans-serif; font-weight: 700; }
details.acc-group[open] > summary::after { content: '−'; }

/* ── Section blocks ── */
.section-block { padding: .85rem 1.25rem 1rem; border-top: 1px solid #1a1a1e; }
.section-heading { display: flex; align-items: center; gap: .65rem; margin-bottom: .6rem; }
.section-icon { color: var(--gold); font-size: .82rem; width: 16px; text-align: center; flex-shrink: 0; }
.section-label { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text); font-family: monospace; flex: 1; }
.section-content { font-size: .87rem; line-height: 1.82; color: #c4bfb6; }
.section-footer { display: flex; justify-content: flex-end; margin-top: .65rem; }

/* ── Refine bar ── */
.refine-bar { background: var(--nm); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: .9rem; display: flex; gap: .75rem; align-items: flex-end; }
.refine-bar .field { flex: 1; }
.refine-hint { font-size: .7rem; color: var(--muted); margin-top: .28rem; }
.refine-btn { background: var(--gold); color: #0a0a0a; border: none; border-radius: 7px; padding: .72rem 1.3rem; font-size: .8rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; cursor: pointer; transition: all .2s; white-space: nowrap; flex-shrink: 0; align-self: flex-start; margin-top: 1.4rem; }
.refine-btn:hover:not(:disabled) { background: var(--gold-lt); }
.refine-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Ghost / outline buttons ── */
.btn-ghost { background: transparent; border: 1px solid #242428; border-radius: 4px; padding: .35rem .75rem; color: var(--dim); font-size: .68rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: color .2s, border-color .2s; font-family: monospace; }
.btn-ghost:hover { color: var(--gold); border-color: rgba(201,168,76,.35); }
.btn-ghost.copied { color: var(--gold); border-color: rgba(201,168,76,.35); }
.btn-outline { background: transparent; color: var(--gold); border: 1px solid rgba(201,168,76,.4); border-radius: 7px; padding: .68rem 1.3rem; font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-outline:hover { background: rgba(201,168,76,.08); border-color: var(--gold); }
.btn-secondary { background: var(--gold); color: #0c0c0e; border: none; border-radius: 7px; padding: .68rem 1.4rem; font-size: .82rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: all .2s; }
.btn-secondary:hover { background: var(--gold-lt); }

/* ── Image Workflow ── */
.workflow-panel { background: var(--nm); border: 1px solid var(--border); border-radius: 12px; padding: 1.6rem 1.7rem; }
.workflow-title { font-family: 'Playfair Display',serif; font-size: 1rem; color: var(--gold); margin-bottom: .35rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border-dim); }
.workflow-hint { font-size: .78rem; color: var(--muted); margin-bottom: 1.2rem; line-height: 1.5; font-style: italic; }
.prompt-block { background: rgba(255,255,255,.022); border: 1px solid rgba(255,255,255,.07); border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: .9rem; position: relative; }
.prompt-block.step-one { border-color: rgba(201,168,76,.35); }
.prompt-block.step-two { border-color: rgba(110,231,183,.2); }
.prompt-label { font-size: .66rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: .55rem; display: block; }
.prompt-label.step-two-lbl { color: #6ee7b7; }
.prompt-text { font-size: .88rem; color: #d8ccb4; line-height: 1.74; padding-right: 5rem; }
.prompt-copy { position: absolute; top: .85rem; right: .85rem; padding: .3rem .82rem; background: var(--gold); color: #0a0a0a; border: none; border-radius: 5px; font-size: .7rem; font-weight: 700; cursor: pointer; letter-spacing: .05em; text-transform: uppercase; transition: background .2s; }
.prompt-copy:hover { background: var(--gold-lt); }
.prompt-copy.ok { background: #2d6a4f; color: #fff; }

/* ── Action bar ── */
.action-bar { display: flex; gap: .65rem; margin-top: 1.5rem; justify-content: flex-end; align-items: center; }

/* ── Responsive ── */
@media (max-width: 760px) {
  .adv-pkg-grid { grid-template-columns: 1fr 1fr; }
  .adv-pkg-grid .cf:last-child { grid-column: 1 / -1; }
  .adv-voice-grid { grid-template-columns: 1fr; }
  .adv-bottom-row { flex-direction: column; gap: 1.2rem; }
  .adv-divider-v { display: none; }
  .inputs-row { grid-template-columns: 1fr; }
}
@media (max-width: 620px) {
  .summary-card { grid-template-columns: 1fr 1fr; }
  .header { padding: 1.25rem; }
  .main { padding: 1.5rem 1rem 4rem; }
  .refine-bar { flex-direction: column; }
  .refine-btn { margin-top: 0; width: 100%; }
  .cbar-row { flex-direction: column; align-items: stretch; }
  .genbtn { width: 100%; text-align: center; }
}
@media (max-width: 420px) {
  .summary-card { grid-template-columns: 1fr; }
}

/* ── Quality Check ── */
.quality-panel { background: var(--nm); border: 1px solid var(--border); border-radius: 12px; padding: 1.6rem 1.7rem; }
.qc-section { margin-top: 1.4rem; }
.qc-section-title { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); margin-bottom: .8rem; }
.qc-row { padding: .7rem 0; border-bottom: 1px solid var(--border-dim); }
.qc-row-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
.qc-crit { font-size: .86rem; color: var(--cream); font-weight: 600; }
.qc-score { font-size: .78rem; font-weight: 700; font-family: monospace; padding: .15rem .5rem; border-radius: 5px; flex-shrink: 0; }
.qc-score-good { background: rgba(74,170,90,.14); color: #6cc47e; }
.qc-score-ok   { background: rgba(201,168,76,.14); color: var(--gold); }
.qc-score-low  { background: rgba(239,68,68,.12); color: #f87171; }
.qc-note { font-size: .78rem; color: var(--muted); margin-top: .3rem; line-height: 1.5; }
.qc-overall { margin-top: 1rem; font-size: .82rem; color: var(--text); line-height: 1.6; background: rgba(255,255,255,.025); border-radius: 8px; padding: .8rem 1rem; }
.qc-palette { display: flex; flex-direction: column; gap: .5rem; }
.qc-swatch-row { display: flex; align-items: center; gap: .7rem; }
.qc-swatch { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; }
.qc-swatch-name { font-size: .82rem; color: var(--cream); flex: 1; }
.qc-hex { font-family: monospace; font-size: .72rem; color: var(--muted); }
.qc-tag { font-size: .68rem; font-family: monospace; padding: .18rem .5rem; border-radius: 5px; flex-shrink: 0; }
.qc-tag-good { background: rgba(74,170,90,.14); color: #6cc47e; }
.qc-tag-low  { background: rgba(239,68,68,.12); color: #f87171; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const SYSTEM_PROMPT = `You are a senior direct mail creative director with 30 years of experience producing award-winning fundraising packages for nonprofits, advocacy organizations, and mission-driven brands.

CRITICAL OUTPUT RULE: Begin your response IMMEDIATELY with ## Theme. Do not write any preamble, introduction, analysis, acknowledgment, or commentary before the first section heading. The very first characters of your response must be "## Theme".

The user will provide:
- Organization name
- Mission statement
- Audience description (demographics, income, interests, giving history, etc.)
- Optional creative overrides (theme, add-in, imagery, envelope format, teaser, colors, ask ladder, tone, campaign goal)

Your job is to generate a complete, campaign-ready direct mail appeal brief in exactly 13 sections, in this exact order, using exactly these headings:

const PALETTE_TOOL = {
  type: "function",
  function: {
    name: "validate_palette",
    description: "Validate hex color codes and check whether each color has enough contrast to print legible text on it. Returns validity and WCAG contrast ratios.",
    parameters: {
      type: "object",
      properties: {
        colors: {
          type: "array",
          description: "The colors from the brief's Color Palette section.",
          items: {
            type: "object",
            properties: {

              hex:  { type: "string", description: "The 6-digit hex code, e.g. '#F5C71A'." }

// Pure helper math — these run in the browser, not in the model.
function hexToRgb(hex) {
  const m = /^#?([0-9a-fA-F]{6})$/.exec(String(hex).trim());
  if (!m) return null;
  const int = parseInt(m[1], 16);
  return { r: (int >> 16) & 255, g: (int >> 8) & 255, b: int & 255 };
}
function relativeLuminance({ r, g, b }) {
  const f = c => { c /= 255; return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); };
  return 0.2126 * f(r) + 0.7152 * f(g) + 0.0722 * f(b);
}
function contrastRatio(rgb1, rgb2) {
  const L1 = relativeLuminance(rgb1), L2 = relativeLuminance(rgb2);
  const [hi, lo] = L1 > L2 ? [L1, L2] : [L2, L1];
  return (hi + 0.05) / (lo + 0.05);
}
// The actual tool implementation the model's call gets routed to.
function runPaletteTool(colors) {
  const white = { r: 255, g: 255, b: 255 }, black = { r: 0, g: 0, b: 0 };
  const items = (colors || []).map(c => {
    const rgb = hexToRgb(c.hex);
    if (!rgb) return { name: c.name, hex: c.hex, valid: false, bestOn: null, ratio: 0, readable: false };
    const cw = contrastRatio(rgb, white), cb = contrastRatio(rgb, black);
    const bestOn = cw >= cb ? "white" : "black";
    const ratio = Math.max(cw, cb);
    return { name: c.name, hex: c.hex, valid: true, bestOn, ratio: Math.round(ratio * 100) / 100, readable: ratio >= 4.5 };
  });
  return { items };
}

function parseSections(text) {
  const result = {};
  const parts = text.split(/^## /m);
  for (const part of parts) {
    if (!part.trim()) continue;
    const nl = part.indexOf("\n");
    if (nl === -1) continue;
    result[part.slice(0, nl).trim()] = part.slice(nl + 1).trim();
  }
  return result;
}

function renderContent(text) {
  const lines = text.split("\n");
  const out = [];
  let listItems = [];
  const flushList = () => {
    if (listItems.length) { out.push(<ul key={`ul-${out.length}`}>{listItems}</ul>); listItems = []; }
  };
  lines.forEach((line, i) => {
    const html = line
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
    if (line.startsWith("- ") || line.startsWith("• ")) {
      listItems.push(<li key={i} dangerouslySetInnerHTML={{ __html: html.replace(/^[-•]\s/, "") }} />);
    } else {
      flushList();
      if (!line.trim()) out.push(<br key={i} />);
      else out.push(<p key={i} dangerouslySetInnerHTML={{ __html: html }} />);
    }
  });
  flushList();
  return out;
}

function useProgress(messages, totalMs) {
  const [status, setStatus] = React.useState("");
  const [pct, setPct] = React.useState(0);
  const tmRef = React.useRef(null);
  const start = React.useCallback(() => {
    const steps = messages.length;
    const stepMs = Math.floor(totalMs / steps);
    let si = 0; setStatus(messages[0]); setPct(0);
    tmRef.current = setInterval(() => {
      si++;
      if (si < messages.length) setStatus(messages[si]);
      setPct(Math.min(88, Math.round((si / steps) * 88)));
    }, stepMs);
  }, [messages, totalMs]);
  const finish = React.useCallback(() => {
    clearInterval(tmRef.current);
    setPct(100);
    setTimeout(() => { setStatus(""); setPct(0); }, 400);
  }, []);
  return { status, pct, start, finish };
}

function ColorSwatch({ label, value, onChange }) {
  const [draft, setDraft] = React.useState(value);
  React.useEffect(() => setDraft(value), [value]);
  return (
    <div className="cs">
      <div className="adv-cswatch-lbl">{label}</div>
      <div className="cs-pick">
        <input type="color" value={value}
          onChange={e => { onChange(e.target.value); setDraft(e.target.value); }} />
      </div>
      <input type="text" className="cs-hex" value={draft} maxLength={7} spellCheck={false}
        onChange={e => {
          setDraft(e.target.value);
          if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) onChange(e.target.value);
        }} />
    </div>
  );
}

  const [error, setError]         = React.useState("");
  const [copied, setCopied]       = React.useState("");
  const [resultTab, setResultTab] = React.useState("brief");
  const [refineInput, setRefineInput] = React.useState("");

  // Quality Check state (prompt evaluation + tool use)
  const [evaluation, setEvaluation]   = React.useState(null);  // { scores:[...], overall }
  const [paletteCheck, setPaletteCheck] = React.useState(null); // { items:[...], summary }
  const [qualityLoading, setQualityLoading] = React.useState(false);
  const [qualityError, setQualityError] = React.useState("");

  // Snapshots for display
  const [orgSnapshot, setOrgSnapshot]             = React.useState("");
  const [audienceSnapshot, setAudienceSnapshot]   = React.useState("");
  const [overridesSnapshot, setOverridesSnapshot] = React.useState([]);
  const [mailDateSnapshot, setMailDateSnapshot]   = React.useState("");
  const [goalSnapshot, setGoalSnapshot]           = React.useState("");
  const [toneSnapshot, setToneSnapshot]           = React.useState("");

  const genProgress    = useProgress(STATUS_MESSAGES, 36000);
  const refineProgress = useProgress(REFINE_STATUS, 28000);
  const outputRef = React.useRef(null);

  const updateColor = (idx, val) => {
    const next = [...colors]; next[idx] = val;
    setColors(next); setColorsChanged(true);
  };
  const resetColors = () => { setColors([...DEFAULT_COLORS]); setColorsChanged(false); };

  const getActiveOverrides = () => {
    const list = [];
    if (theme) list.push("Theme");
    if (addinOverride) list.push("Add-In");
    if (imageryOverride) list.push("Imagery");
    if (mailMonth || mailYear) list.push("Mail Date");
    if (envelopeFormat) list.push("Envelope");
    if (teaserOverride) list.push("Teaser");
    if (colorsChanged) list.push("Colors");
    const lo = ladderLow.replace(/\D/g,""), mi = ladderMid.replace(/\D/g,""), hi = ladderHigh.replace(/\D/g,"");
    if (lo && mi && hi) list.push("Ladder");
    if (campaignGoal) list.push("Goal");
    if (tone) list.push("Tone");
    if (noRules) list.push("No Rules");
    return list;
  };

  const buildUserMessage = () => {
    let msg = `Organization: ${orgName}\n\nMission: ${mission}\n\nAudience: ${audience}`;
    const extras = [];
    const mailDate = [mailMonth, mailYear].filter(Boolean).join(" ");
    if (campaignGoal) extras.push(`Campaign Goal: ${campaignGoal}`);
    if (tone) extras.push(`Tone & Voice: ${tone}`);
    if (theme) extras.push(`Creative Direction / Theme: ${theme}`);
    if (mailDate) extras.push(`Mail Date: ${mailDate}`);
    if (lastPackage) extras.push(`Last Package Sent: ${lastPackage} — avoid repeating the same add-in type, color palette, or theme`);
    if (envelopeFormat) extras.push(`Envelope Format: ${envelopeFormat}`);
    if (addinOverride) extras.push(`Physical Add-In Override — use exactly this add-in: ${addinOverride}`);
    if (imageryOverride) extras.push(`Imagery Override — use this specific visual direction: ${imageryOverride}`);
    if (teaserOverride) extras.push(`Envelope Teaser Override — use this exact teaser copy: "${teaserOverride}"`);
    if (colorsChanged) extras.push(`Color Palette Override — Primary: ${colors[0]}, Secondary: ${colors[1]}, Accent: ${colors[2]}`);
    const lo = ladderLow.replace(/\D/g,""), mi = ladderMid.replace(/\D/g,""), hi = ladderHigh.replace(/\D/g,"");
    if (lo && mi && hi) extras.push(`Ask Ladder Override: $${lo} / $${mi} / $${hi}`);
    if (noRules) extras.push(`CREATIVE FREEDOM: Ignore all standard direct mail guardrails and conventions. Generate an unconstrained, experimental concept.`);
    if (extras.length) msg += "\n\n" + extras.join("\n");
    return msg;
  };

  const validateOverrides = () => {
    const lo = ladderLow.replace(/\D/g,""), mi = ladderMid.replace(/\D/g,""), hi = ladderHigh.replace(/\D/g,"");
    if (ladderLow || ladderMid || ladderHigh) {
      if (!(lo && mi && hi)) return "Ask ladder requires all three amounts (Low, Mid, High).";
      const [a,b,c] = [lo,mi,hi].map(Number);
      if (!a||!b||!c||!(a<b&&b<c)) return "Ask ladder must be three valid ascending dollar amounts.";
    }
    if (colorsChanged) {
      for (const col of colors) {
        if (!/^#[0-9a-fA-F]{6}$/.test(col)) return "Color palette must use valid 6-digit hex values (e.g. #1a3558).";
      }
    }
    return "";
  };

  // Low-level call. Returns the full message object so callers can read either
  // .content (text) or .tool_calls (when the model wants to call a tool).
  const callOpenAIRaw = async (messages, opts = {}) => {
    const cleanKey = apiKey.trim().replace(/[^\x20-\x7E]/g, "");
    const body = { model: "gpt-4o", messages, max_tokens: opts.maxTokens || 5000, temperature: opts.temperature ?? 0.8 };
    if (opts.tools) body.tools = opts.tools;
    if (opts.toolChoice) body.tool_choice = opts.toolChoice;
    if (opts.jsonMode) body.response_format = { type: "json_object" };
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${cleanKey}` },
      body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
    const data = await res.json();
    return data.choices[0].message;
  };
  // Convenience wrapper for the existing text-only callers.
  const callOpenAI = async (messages) => (await callOpenAIRaw(messages)).content;

  const generate = async () => {
    if (!apiKey.trim()) { setError("Enter your OpenAI API key to continue."); return; }
    if (!orgName.trim() || !mission.trim() || !audience.trim()) { setError("Fill in Organization, Mission, and Audience before generating."); return; }
    const validErr = validateOverrides();
    if (validErr) { setError(validErr); return; }
    const mailDate = [mailMonth, mailYear].filter(Boolean).join(" ");
    setError(""); setLoading(true); setSections(null); setRawText(""); setResultTab("brief");
    setEvaluation(null); setPaletteCheck(null); setQualityError("");
    setOrgSnapshot(orgName.trim()); setAudienceSnapshot(audience.trim());
    setOverridesSnapshot(getActiveOverrides());
    setMailDateSnapshot(mailDate);
    setGoalSnapshot(GOAL_OPTIONS.find(o => o.value === campaignGoal)?.label || "");
    setToneSnapshot(TONE_OPTIONS.find(o => o.value === tone)?.label || "");
    genProgress.start();
    try {
      const text = await callOpenAI([
        { role: "system", content: SYSTEM_PROMPT },
        { role: "user", content: buildUserMessage() }
      ]);
      genProgress.finish();
      const parsed = parseSections(text);
      setRawText(text);
      if (Object.keys(parsed).length === 0) {
        setError("Response didn't match the expected format. Raw response: " + text.slice(0, 600));
      } else {
        setSections(parsed);
        setTimeout(() => outputRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
        runQualityChecks(text, parsed); // fire-and-forget: scores the brief in the background
      }
    } catch(e) {
      genProgress.finish();
      setError(e.message || "Something went wrong. Check your API key and try again.");
    } finally { setLoading(false); }
  };

  // Runs the two quality features in parallel after a brief is generated:
  //   1. evaluation  — LLM-as-judge scores the whole brief against a rubric
  //   2. paletteCheck — tool-use loop validates the color palette's contrast
  const runQualityChecks = async (briefText, parsed) => {
    setQualityLoading(true); setQualityError("");
    try {
      const [evalResult, paletteResult] = await Promise.all([
        evaluateBrief(briefText),
        checkPalette(parsed["Color Palette"] || "")
      ]);
      setEvaluation(evalResult);
      setPaletteCheck(paletteResult);
    } catch(e) {
      setQualityError(e.message || "Quality check could not complete.");
    } finally { setQualityLoading(false); }
  };

  // FEATURE 1 — Prompt evaluation (LLM-as-judge). One JSON-mode call.
  const evaluateBrief = async (briefText) => {
    const msg = await callOpenAIRaw([
      { role: "system", content: EVAL_SYSTEM_PROMPT },
      { role: "user", content: `Here is the brief to grade:\n\n${briefText}` }
    ], { jsonMode: true, temperature: 0.2, maxTokens: 900 });
    return JSON.parse(msg.content);
  };

  // FEATURE 2 — Tool use (function calling). The full loop:
  //   a) ask the model to validate the palette, forcing it to call our tool
  //   b) read the hex codes it extracted, run the REAL math in runPaletteTool()
  //   c) send the tool result back, get a plain-English assessment
  const checkPalette = async (paletteText) => {
    if (!paletteText.trim()) return null;
    const messages = [
      { role: "system", content: "You are a print production assistant. Use the validate_palette tool to check the colors in the provided palette text. Extract every color name and its hex code." },
      { role: "user", content: `Color Palette section:\n\n${paletteText}` }
    ];
    // (a) force the tool call
    const first = await callOpenAIRaw(messages, {
      tools: [PALETTE_TOOL],
      toolChoice: { type: "function", function: { name: "validate_palette" } },
      temperature: 0, maxTokens: 500
    });
    const toolCall = first.tool_calls?.[0];
    if (!toolCall) return null;
    const args = JSON.parse(toolCall.function.arguments);
    // (b) run the actual validation in the browser
    const result = runPaletteTool(args.colors);
    // (c) hand the result back to the model for a readable summary
    messages.push(first);
    messages.push({ role: "tool", tool_call_id: toolCall.id, content: JSON.stringify(result) });
    const second = await callOpenAIRaw(messages, { temperature: 0.3, maxTokens: 400 });
    return { items: result.items, summary: second.content };
  };

  const refine = async () => {
    if (!refineInput.trim() || !rawText) return;
    setRefining(true); setError(""); setResultTab("brief");
    refineProgress.start();
    try {
      const text = await callOpenAI([
        { role: "system", content: REFINE_SYSTEM_PROMPT },
        { role: "user", content: `Existing brief:\n\n${rawText}\n\n---\n\nRefinement instruction: ${refineInput}\n\nReturn the complete updated brief in the same 13-section format.` }
      ]);
      refineProgress.finish();
      const reparsed = parseSections(text);
      setRawText(text); setSections(reparsed); setRefineInput("");
      setEvaluation(null); setPaletteCheck(null);
      runQualityChecks(text, reparsed); // re-score the refined brief
    } catch(e) {
      refineProgress.finish();
      setError(e.message || "Refinement failed. Check your API key and try again.");
    } finally { setRefining(false); }
  };

  const clearAll = () => {
    setTheme(""); setAddinOverride(""); setImageryOverride("");
    setMailMonth(""); setMailYear(""); setLastPackage("");
    setEnvelopeFormat(""); setTeaserOverride("");
    resetColors();
    setLadderLow(""); setLadderMid(""); setLadderHigh("");
    setNoRules(false); setCampaignGoal(""); setTone("");
    setSections(null); setRawText(""); setError("");
    setResultTab("brief"); setRefineInput("");
    setEvaluation(null); setPaletteCheck(null); setQualityError("");
  };

  const copy = (key, text) => {
    navigator.clipboard.writeText(text);
    setCopied(key); setTimeout(() => setCopied(""), 1800);
  };

  const download = () => {
    if (!rawText || !orgSnapshot) return;
    let c = `Appeal Studio — Direct Mail Brief\nOrganization: ${orgSnapshot}\n`;
    if (mailDateSnapshot) c += `Mail Date: ${mailDateSnapshot}\n`;
    if (goalSnapshot) c += `Campaign Goal: ${goalSnapshot}\n`;
    if (toneSnapshot) c += `Tone: ${toneSnapshot}\n`;
    if (overridesSnapshot.length) c += `Overrides: ${overridesSnapshot.join(", ")}\n`;
    const lo = ladderLow.replace(/\D/g,""), mi = ladderMid.replace(/\D/g,""), hi = ladderHigh.replace(/\D/g,"");
    if (lo && mi && hi) c += `Gift Ladder: $${lo} / $${mi} / $${hi}\n`;
    c += `\n${rawText}`;
    const blob = new Blob([c], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `appeal_brief_${orgSnapshot.replace(/\s+/g,"_").toLowerCase()}.txt`;
    a.click();
  };

  const isLoading = loading || refining;
  const activeProgress = refining ? refineProgress : genProgress;

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="logo-badge">AS</div>
        <div>
          <div className="header-title">Appeal Studio</div>
          <div className="header-sub">Direct Mail Intelligence</div>
        </div>
      </div>

      <div className="main">

        {/* Hero — hide once results exist */}
        {!sections && !isLoading && (
          <div className="hero">
            <h1>Generate a complete<br /><span className="hero-accent">direct mail appeal brief</span></h1>
            <p className="hero-sub">
              Describe your organization and audience, customize every creative dimension, and get a 13-section campaign-ready brief powered by GPT-4o.
            </p>
          </div>
        )}

        {/* Required inputs */}
        <div className="inputs-card">
          <div className="inputs-row">
            <div className="field">
              <label className="label">OpenAI API Key</label>
              <input type="password" className="input" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-..." />
            </div>
            <div className="field">
              <label className="label">Organization Name</label>
              <input type="text" className="input" value={orgName} onChange={e => setOrgName(e.target.value)} placeholder="e.g. Midwest Food Pantry Network" />
            </div>
          </div>
          <div className="field" style={{ marginTop: "1.1rem" }}>
            <label className="label">Mission Statement</label>
            <textarea className="input" value={mission} onChange={e => setMission(e.target.value)}
              placeholder="2–3 sentences describing what your organization does and who it serves..."
              style={{ height: "72px" }} />
          </div>
          <div className="field" style={{ marginTop: "1.1rem" }}>
            <label className="label">Audience Description</label>
            <textarea className="input" value={audience} onChange={e => setAudience(e.target.value)}
              placeholder="Describe your target donors — age, income, location, interests, giving history, lifestyle. The more detail, the better the brief."
              style={{ height: "90px" }} />
          </div>
        </div>

        {/* Customize Bar */}
        <div className="cbar">
          <p className="cbar-note">Optional creative overrides — leave blank to let the model decide.</p>

          {/* Row 1: Creative Direction, Add-In, Imagery */}
          <div className="cbar-row">
            <div className="cf cf-wide">
              <span className="cl">Creative Direction <em>(optional)</em></span>
              <input type="text" className="ci" value={theme} onChange={e => setTheme(e.target.value)}
                placeholder="e.g. Spring renewal, winter urgency, donor upgrade" maxLength={200} />
            </div>
            <div className="cf cf-med">
              <span className="cl">Add-In <em>(override)</em></span>
              <input type="text" className="ci" value={addinOverride} onChange={e => setAddinOverride(e.target.value)}
                placeholder="e.g. Seed packet, journal" maxLength={200} />
            </div>
            <div className="cf cf-med">
              <span className="cl">Imagery <em>(override)</em></span>
              <input type="text" className="ci" value={imageryOverride} onChange={e => setImageryOverride(e.target.value)}
                placeholder="e.g. Warm autumn, rural farmhouse" maxLength={200} />
            </div>
          </div>

          {/* Advanced Options */}
          <details className="cbar-adv">
            <summary>Advanced Options</summary>
            <div className="cbar-adv-body">

              {/* Package row */}
              <div>
                <div className="adv-sec-lbl">Package</div>
                <div className="adv-pkg-grid">
                  <div className="cf">
                    <span className="cl">Envelope <em>format</em></span>
                    <div className="sw">
                      <select className="ci" value={envelopeFormat} onChange={e => setEnvelopeFormat(e.target.value)}>
                        {ENVELOPE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="cf">
                    <span className="cl">Mail Month</span>
                    <div className="sw">
                      <select className="ci" value={mailMonth} onChange={e => setMailMonth(e.target.value)}>
                        <option value="">Month</option>
                        {MONTHS.map(m => <option key={m} value={m}>{m}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="cf">
                    <span className="cl">Year</span>
                    <input type="text" className="ci" value={mailYear} onChange={e => setMailYear(e.target.value)} placeholder="2026" maxLength={4} />
                  </div>
                  <div className="cf">
                    <span className="cl">Last Package <em>sent</em></span>
                    <input type="text" className="ci" value={lastPackage} onChange={e => setLastPackage(e.target.value)}
                      placeholder="e.g. Floral calendar, Jan 2025" maxLength={200} />
                  </div>
                </div>
                <div className="cf" style={{ marginTop: ".8rem" }}>
                  <span className="cl">Envelope Teaser <em>(override)</em></span>
                  <input type="text" className="ci" value={teaserOverride} onChange={e => setTeaserOverride(e.target.value)}
                    placeholder='e.g. "A gift inside — for a child who needs a home."' maxLength={200} />
                </div>
              </div>

              <div className="adv-divider" />

              {/* Creative voice */}
              <div>
                <div className="adv-sec-lbl">Creative Voice</div>
                <div className="adv-voice-grid">
                  <div className="cf">
                    <span className="cl">Tone <em>optional</em></span>
                    <div className="sw">
                      <select className="ci" value={tone} onChange={e => setTone(e.target.value)}>
                        {TONE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="cf">
                    <span className="cl">Campaign Goal <em>optional</em></span>
                    <div className="sw">
                      <select className="ci" value={campaignGoal} onChange={e => setCampaignGoal(e.target.value)}>
                        {GOAL_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <div className="adv-divider" />

              {/* Colors + Ladder */}
              <div className="adv-bottom-row">
                <div>
                  <div className="adv-sec-lbl">Color Palette <em>overrides AI selection</em></div>
                  <div className="adv-color-row">
                    <ColorSwatch label="Primary"   value={colors[0]} onChange={v => updateColor(0, v)} />
                    <ColorSwatch label="Secondary" value={colors[1]} onChange={v => updateColor(1, v)} />
                    <ColorSwatch label="Accent"    value={colors[2]} onChange={v => updateColor(2, v)} />
                    <button className="cs-reset" onClick={resetColors} title="Reset to defaults">↺</button>
                  </div>
                  {colorsChanged && (
                    <div style={{ fontSize: ".62rem", color: "var(--gold)", marginTop: ".35rem", letterSpacing: ".06em" }}>
                      ● Colors override active
                    </div>
                  )}
                </div>

                <div className="adv-divider-v" />

                <div>
                  <div className="adv-sec-lbl">Ask Ladder <em>overrides AI selection</em></div>
                  <div className="ladder">
                    <input type="text" value={ladderLow}  onChange={e => setLadderLow(e.target.value)}  placeholder="Low"  maxLength={7} />
                    <input type="text" value={ladderMid}  onChange={e => setLadderMid(e.target.value)}  placeholder="Mid"  maxLength={7} />
                    <input type="text" value={ladderHigh} onChange={e => setLadderHigh(e.target.value)} placeholder="High" maxLength={7} />
                  </div>
                </div>
              </div>

            </div>
          </details>

          {/* Action row */}
          <div className="cbar-actions">
            <button className={`tog ${noRules ? "on-red" : ""}`} onClick={() => setNoRules(!noRules)}
              title="Remove all guardrails — experimental generation">
              ⚠ No Rules
            </button>
            <button className="tog" onClick={clearAll} title="Clear all overrides and output">
              ✕ Clear
            </button>
            <div className="cbar-spacer" />
            <button className={`genbtn ${isLoading ? "generating" : ""}`} onClick={generate} disabled={isLoading}>
              {isLoading ? "Generating…" : sections ? "Regenerate →" : "Generate Appeal Brief →"}
            </button>
          </div>
        </div>

        {/* Error */}
        {error && <div className="error">⚠ {error}</div>}

        {/* Loading */}
        {isLoading && (
          <div className="loading">
            <div className="spinner" />
            <div className="loading-label">{refining ? "Refining your brief…" : "Writing your appeal brief…"}</div>
            <div className="loading-status">{activeProgress.status}</div>
            <div className="loading-bar-wrap">
              <div className="loading-bar" style={{ width: `${activeProgress.pct}%` }} />
            </div>
          </div>
        )}

        {/* Output */}
        {sections && !isLoading && (
          <div ref={outputRef}>
            {/* Output header */}
            <div className="output-header">
              <div>
                <div className="output-meta-label">Campaign Brief</div>
                <div className="output-title">{orgSnapshot}</div>
              </div>
              <button className={`btn-ghost ${copied === "__ALL__" ? "copied" : ""}`}
                onClick={() => copy("__ALL__", rawText)}>
                {copied === "__ALL__" ? "✓ Copied All" : "Copy All"}
              </button>
            </div>

            {/* Summary card */}
            <div className="summary-card">
              <div className="summary-item">
                <div className="summary-key">Organization</div>
                <div className="summary-val">{orgSnapshot}</div>
                {mailDateSnapshot && <div className="summary-val sm">{mailDateSnapshot}</div>}
              </div>
              <div className="summary-item">
                <div className="summary-key">Campaign Context</div>
                {goalSnapshot && <div className="summary-val">{goalSnapshot}</div>}
                {toneSnapshot && <div className="summary-val sm">{toneSnapshot} tone</div>}
                {!goalSnapshot && !toneSnapshot && <div className="summary-val sm">AI-driven</div>}
              </div>
              <div className="summary-item">
                <div className="summary-key">Overrides Active</div>
                {overridesSnapshot.length > 0 ? (
                  <div className="summary-badges">
                    {overridesSnapshot.map(o => (
                      <span key={o} className={`sbadge ${o === "No Rules" ? "red" : ""}`}>{o}</span>
                    ))}
                  </div>
                ) : (
                  <div className="summary-val sm">None — AI-driven</div>
                )}
              </div>
            </div>

            {/* Result tabs */}
            <div className="result-tabs">
              <button className={`result-tab ${resultTab === "brief" ? "active" : ""}`}
                onClick={() => setResultTab("brief")}>Appeal Brief</button>
              <button className={`result-tab ${resultTab === "workflow" ? "active" : ""}`}
                onClick={() => setResultTab("workflow")}>Image Workflow</button>
              <button className={`result-tab ${resultTab === "quality" ? "active" : ""}`}
                onClick={() => setResultTab("quality")}>
                Quality Check{qualityLoading ? " …" : evaluation ? ` · ${(evaluation.scores.reduce((s,c)=>s+c.score,0)/evaluation.scores.length).toFixed(1)}` : ""}
              </button>
            </div>

            {/* Post-generate error */}
            {error && <div className="error">⚠ {error}</div>}

            {/* Brief tab */}
            {resultTab === "brief" && (
              <div>
                <div className="refine-bar">
                  <div className="field">
                    <label className="label">Refine This Appeal</label>
                    <input type="text" className="input" value={refineInput}
                      onChange={e => setRefineInput(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); refine(); } }}
                      placeholder="e.g. switch the add-in to a seed packet, make the letter warmer, use a Christmas theme…"
                      style={{ fontSize: ".88rem" }} />
                    <div className="refine-hint">Describe what to change — everything else stays intact</div>
                  </div>
                  <button className="refine-btn" onClick={refine} disabled={!refineInput.trim()}>Refine</button>
                </div>

                {GROUPS.map(group => (
                  <details key={group.title} className="acc-group" open>
                    <summary>{group.title}</summary>
                    <div>
                      {group.sections.map(secName => {
                        const content = sections[secName] || "";
                        if (!content) return null;
                        return (
                          <div key={secName} className="section-block">
                            <div className="section-heading">
                              <span className="section-icon">{ICONS[secName]}</span>
                              <span className="section-label">{secName}</span>
                            </div>
                            <div className="section-content">{renderContent(content)}</div>
                            <div className="section-footer">
                              <button className={`btn-ghost ${copied === secName ? "copied" : ""}`}
                                onClick={() => copy(secName, content)}>
                                {copied === secName ? "✓ Copied" : "Copy"}
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </details>
                ))}
              </div>
            )}

            {/* Image Workflow tab */}
            {resultTab === "workflow" && (
              <div className="workflow-panel">
                <div className="workflow-title">🎨 Image Workflow</div>
                <p className="workflow-hint">
                  Use the Brief tab for review and refinement. When ready to generate the package image, copy these two prompts into your image AI — Step 1 sets the persona, Step 2 is the blueprint.
                </p>
                <div className="prompt-block step-one">
                  <span className="prompt-label">Step 1 — Master Persona Prompt</span>
                  <button className={`prompt-copy ${copied === "__PERSONA__" ? "ok" : ""}`}
                    onClick={() => copy("__PERSONA__", MASTER_PERSONA_PROMPT)}>
                    {copied === "__PERSONA__" ? "Copied!" : "Copy"}
                  </button>
                  <div className="prompt-text">{MASTER_PERSONA_PROMPT}</div>
                </div>
                {sections["Appeal Package Image Prompt"] ? (
                  <div className="prompt-block step-two">
                    <span className="prompt-label step-two-lbl">Step 2 — Appeal Package Blueprint Prompt</span>
                    <button className={`prompt-copy ${copied === "__BLUEPRINT__" ? "ok" : ""}`}
                      onClick={() => copy("__BLUEPRINT__", sections["Appeal Package Image Prompt"].replace(/\*\*/g,""))}>
                      {copied === "__BLUEPRINT__" ? "Copied!" : "Copy"}
                    </button>
                    <div className="prompt-text">{sections["Appeal Package Image Prompt"].replace(/\*\*/g,"")}</div>
                  </div>
                ) : (
                  <div style={{ color:"var(--muted)", fontSize:".84rem", fontStyle:"italic" }}>
                    Image prompt not found in this brief. Try regenerating.
                  </div>
                )}
              </div>
            )}

            {/* Quality Check tab */}
            {resultTab === "quality" && (
              <div className="quality-panel">
                <div className="workflow-title">✓ Quality Check</div>
                <p className="workflow-hint">
                  An automated review of this brief. The score uses an AI judge against a fixed rubric; the palette check uses a tool that measures real print contrast.
                </p>

                {qualityLoading && (
                  <div className="loading" style={{ padding: "2rem 0" }}>
                    <div className="spinner"></div>
                    <div className="loading-label">Reviewing brief…</div>
                  </div>
                )}

                {qualityError && <div className="error">⚠ {qualityError}</div>}

                {/* Prompt evaluation (LLM-as-judge) */}
                {evaluation && (
                  <div className="qc-section">
                    <div className="qc-section-title">Brief Score — Rubric Evaluation</div>
                    {evaluation.scores.map(s => (
                      <div key={s.criterion} className="qc-row">
                        <div className="qc-row-head">
                          <span className="qc-crit">{s.criterion}</span>
                          <span className={`qc-score qc-score-${s.score >= 4 ? "good" : s.score === 3 ? "ok" : "low"}`}>{s.score}/5</span>
                        </div>
                        <div className="qc-note">{s.note}</div>
                      </div>
                    ))}
                    {evaluation.overall && (
                      <div className="qc-overall"><strong>Summary:</strong> {evaluation.overall}</div>
                    )}
                  </div>
                )}

                {/* Tool use (palette contrast validation) */}
                {paletteCheck && (
                  <div className="qc-section">
                    <div className="qc-section-title">Palette Check — Tool Use</div>
                    <div className="qc-palette">
                      {paletteCheck.items.map((it, i) => (
                        <div key={i} className="qc-swatch-row">
                          <span className="qc-swatch" style={{ background: it.valid ? it.hex : "transparent", border: it.valid ? "none" : "1px dashed #777" }}></span>
                          <span className="qc-swatch-name">{it.name} <span className="qc-hex">{it.hex}</span></span>
                          {it.valid ? (
                            <span className={`qc-tag ${it.readable ? "qc-tag-good" : "qc-tag-low"}`}>
                              {it.ratio}:1 · best on {it.bestOn}{it.readable ? "" : " · low contrast"}
                            </span>
                          ) : (
                            <span className="qc-tag qc-tag-low">invalid hex</span>
                          )}
                        </div>
                      ))}
                    </div>
                    {paletteCheck.summary && <div className="qc-overall">{paletteCheck.summary}</div>}
                  </div>
                )}

                {!qualityLoading && !evaluation && !paletteCheck && !qualityError && (
                  <div style={{ color:"var(--muted)", fontSize:".84rem", fontStyle:"italic" }}>
                    No quality data yet. Generate a brief to run the check.
                  </div>
                )}
              </div>
            )}

            {/* Action bar */}
            <div className="action-bar">
              <button className="btn-outline" onClick={download}>Download .txt</button>
              <button className="btn-secondary" onClick={generate}>Regenerate</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
